<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAS.DEV | Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo-container">
            <div class="logo-icon">Y</div>
            <h1 class="logo-text">YAS<span>.DEV</span></h1>
        </div>
        <nav class="nav-links">
            <a href="#tools">Tools</a>
            <a href="#projects">Projects</a>
            <a href="#contact">Terminal</a>
        </nav>
    </header>

    <main class="container">
        <!-- Hero Section -->
        <section class="hero">
            <h2 class="hero-title">
                Design que brilha, <br>
                <span class="gradient-text">Código que escala.</span>
            </h2>
            <p class="hero-subtitle">
                Graduada em ADS, especialista em transformar identidades visuais em interfaces de alta performance.
            </p>
        </section>

        <!-- Color Palette Lab -->
        <section id="tools" class="tool-section">
            <div class="section-header">
                <h3>Purple Palette Lab</h3>
            </div>
            <div class="palette-grid">
                <div class="color-card">
                    <div class="color-box shade-light"></div>
                    <p>#A78BFA</p>
                </div>
                <div class="color-card">
                    <div class="color-box shade-main"></div>
                    <p>#7C3AED</p>
                </div>
                <div class="color-card">
                    <div class="color-box shade-dark"></div>
                    <p>#4C1D95</p>
                </div>
                <div class="color-card">
                    <div class="color-box shade-deep"></div>
                    <p>#2E1065</p>
                </div>
            </div>
        </section>
    </main>

    <footer id="contact" class="footer">
        <div class="terminal-text">
            <span class="prompt">➜</span> yasmin-silva ~ <span class="method">contact.init()</span>
        </div>
        <div class="social-links">
            <a href="#">GitHub</a>
            <a href="#">LinkedIn</a>
            <a href="#" class="hire-me">Hire Me</a>
        </div>
    </footer>

</body>
</html>
